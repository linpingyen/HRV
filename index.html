<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iOS 相機極簡測試</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; padding: 20px; }
        #camera-container { width: 100%; max-width: 400px; height: 300px; border: 3px dashed #ff4757; margin: 20px auto; background: #000; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* 鏡像翻轉符合前鏡頭習慣 */ }
        button { padding: 15px 30px; font-size: 1.2rem; background: #2ed573; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:active { background: #26af5f; }
        #status { margin-top: 15px; color: #ffa502; font-family: monospace; }
    </style>
</head>
<body>

    <h2>iOS Camera Connection Test</h2>
    
    <div id="camera-container">
        <video id="testVideo" autoplay playsinline muted></video>
    </div>

    <button id="testBtn">開啟前鏡頭</button>
    
    <div id="status">狀態：等待點擊...</div>

    <script>
        const video = document.getElementById('testVideo');
        const btn = document.getElementById('testBtn');
        const status = document.getElementById('status');

        btn.addEventListener('click', async () => {
            status.innerText = "狀態：正在請求權限...";
            
            try {
                // 請求相機
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" },
                    audio: false 
                });
                
                status.innerText = "狀態：成功取得串流，正在嘗試播放...";
                video.srcObject = stream;
                
                // 針對 iOS 的強制播放與錯誤捕獲
                video.play().then(() => {
                    status.innerText = "狀態：畫面成功播放中！";
                    status.style.color = "#2ed573";
                    btn.style.display = "none"; // 成功後隱藏按鈕
                }).catch((playErr) => {
                    status.innerText = "錯誤 (play)：" + playErr.message;
                    status.style.color = "#ff4757";
                });

            } catch (err) {
                status.innerText = "錯誤 (getUserMedia)：" + err.name + " - " + err.message;
                status.style.color = "#ff4757";
            }
        });
    </script>
</body>
</html>
