<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>rPPG 綠色通道波形化</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff66; text-align: center; padding: 10px; margin: 0; }
        .box { width: 100%; max-width: 360px; height: 270px; margin: 10px auto; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #333; }
        .box h3 { position: absolute; top: 5px; left: 10px; margin: 0; background: rgba(0,0,0,0.8); padding: 4px 8px; font-size: 0.8rem; border-radius: 4px; z-index: 10; color: #00ff66; border: 1px solid #00ff66; }
        
        /* 框框 1：相機（上面疊加一個用於繪製採樣框的 Canvas） */
        #video-container { position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        /* 框框 2：即時波形圖 */
        #waveCanvas { width: 100%; height: 100%; background: #050505; }
        
        button { padding: 15px 30px; font-size: 1.2rem; background: #00ff66; color: #000; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; margin: 15px 0; }
        #status { color: #ffa502; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Step 3: Signal Extraction</h2>
    <div id="status">狀態：準備就緒</div>
    <button id="startBtn">開始監測綠色訊號</button>

    <div class="box id="video-container">
        <h3>[1] Face Target Area</h3>
        <video id="testVideo" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
    </div>

    <div class="box">
        <h3>[2] Real-time Green Intensity Wave</h3>
        <canvas id="waveCanvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('testVideo');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');
        const waveCanvas = document.getElementById('waveCanvas');
        const waveCtx = waveCanvas.getContext('2d');
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        
        let isRunning = false;
        let greenHistory = []; // 儲存綠色數值的歷史紀錄
        const maxPoints = 120;  // 波形圖畫面上顯示的點數（約 4 秒的資料）

        // 用於在彩色畫面上抓取像素的隱藏 Canvas
        const hiddenCanvas = document.createElement('canvas');
        const hiddenCtx = hiddenCanvas.getContext('2d');

        btn.addEventListener('click', async () => {
            if (isRunning) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false 
                });
                video.srcObject = stream;
                await video.play();
                
                btn.style.display = "none";
                isRunning = true;
                status.innerText = "請將臉部（額頭或臉頰）對準中央方框，並保持靜止。";
                
                requestAnimationFrame(processLoop);
            } catch (err) {
                status.innerText = "錯誤：" + err.message;
            }
        });

        function processLoop() {
            if (!isRunning || video.paused || video.ended) {
                requestAnimationFrame(processLoop);
                return;
            }

            // 同步所有 Canvas 的解析度
            if (overlayCanvas.width !== video.videoWidth && video.videoWidth > 0) {
                overlayCanvas.width = video.videoWidth;
                overlayCanvas.height = video.videoHeight;
                waveCanvas.width = 400;
                waveCanvas.height = 200;
                hiddenCanvas.width = video.videoWidth;
                hiddenCanvas.height = video.videoHeight;
            }

            if (overlayCanvas.width > 0) {
                // 定義中央採樣框 (ROI) 的範圍：畫面的中央 30% 到 70%
                const startX = Math.floor(overlayCanvas.width * 0.35);
                const endX = Math.floor(overlayCanvas.width * 0.65);
                const startY = Math.floor(overlayCanvas.height * 0.35);
                const endY = Math.floor(overlayCanvas.height * 0.65);
                const widthROI = endX - startX;
                const heightROI = endY - startY;

                // --- 1. 在彩色畫面上繪製綠色目標框 ---
                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                overlayCtx.strokeStyle = '#00ff66';
                overlayCtx.lineWidth = 4;
                // 因為 video 有被我們用 CSS 鏡像翻轉 (scaleX(-1))，為了讓框框對齊，我們直接畫在對應位置
                overlayCtx.strokeRect(startX, startY, widthROI, heightROI);

                // --- 2. 提取中央框框內的綠色通道平均值 ---
                hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                // 只抓取中央 ROI 區域的像素，節省運算效能
                const imgData = hiddenCtx.getImageData(startX, startY, widthROI, heightROI);
                const data = imgData.data;

                let totalGreen = 0;
                let pixelCount = 0;

                for (let i = 0; i < data.length; i += 4) {
                    totalGreen += data[i + 1]; // 累加綠色通道的值 (G)
                    pixelCount++;
                }

                if (pixelCount > 0) {
                    const avgGreen = totalGreen / pixelCount;
                    greenHistory.push(avgGreen);
                    if (greenHistory.length > maxPoints) greenHistory.shift();
                }

                // --- 3. 繪製即時綠色波形圖 (類 PPG) ---
                drawWaveform();
            }

            requestAnimationFrame(processLoop);
        }

        function drawWaveform() {
            waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
            if (greenHistory.length < 2) return;

            // 自動縮放 (Auto-Gain)：找出這段時間內的最高與最低亮度，放大微弱的心搏訊號
            const min = Math.min(...greenHistory);
            const max = Math.max(...greenHistory);
            const range = (max - min) || 1;

            waveCtx.beginPath();
            waveCtx.strokeStyle = '#00ff66';
            waveCtx.lineWidth = 3;

            for (let i = 0; i < greenHistory.length; i++) {
                // 計算 X 座標（向左滾動效果）
                const x = (i / (maxPoints - 1)) * waveCanvas.width;
                
                // 計算 Y 座標：反轉 Y 軸。
                // 當微血管充血時，綠光吸收多、反射少（數值下降），反轉後在圖表上就會呈現「向上彈升」的脈搏峰值。
                const y = waveCanvas.height - ((greenHistory[i] - min) / range) * waveCanvas.height;

                if (i === 0) waveCtx.moveTo(x, y);
                else waveCtx.lineTo(x, y);
            }
            waveCtx.stroke();
        }
    </script>
</body>
</html>
