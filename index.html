<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>rPPG 臨床級自律神經落點分析儀</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="自律神經分析">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    
    <link rel="icon" type="image/png" sizes="32x32" href="./icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon.png">
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Microsoft JhengHei", sans-serif; background: #0a0a0a; color: #00ff66; text-align: center; padding: 10px; margin: 0; }
        h2 { font-size: 1.1rem; margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .box { width: 100%; max-width: 500px; margin: 5px auto; background: #111; border: 1px solid #333; padding: 10px; box-sizing: border-box; border-radius: 8px; }
        video { transform: scaleX(-1); background: #222; width: 100%; height: auto; border-radius: 6px; }
        canvas { background: #000; display: block; margin: 5px auto; width: 100%; height: auto; border-radius: 6px; }
        
        button { background: #00ff66; color: #000; border: none; padding: 12px 24px; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        button:active { background: #00cc55; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; text-align: left; }
        .card { background: #1a1a1a; padding: 8px 12px; border-left: 3px solid #00ff66; border-radius: 4px; }
        .card label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 2px; }
        .card span { font-size: 1.1rem; font-weight: bold; color: #fff; }
        
        #chartContainer { position: relative; width: 100%; height: 260px; background: #000; border: 1px solid #222; border-radius: 6px; margin-top: 10px; overflow: hidden; }
        #uCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #status { font-size: 0.85rem; color: #ffaa00; font-weight: bold; margin: 5px 0; min-height: 1.2rem; }
    </style>
</head>
<body>

    <div class="box">
        <h2>rPPG 生物訊號源</h2>
        <video id="video" autoplay playsinline muted></video>
        <div id="status">請允許相機權限以啟動即時分析...</div>
        <button id="btnAction">開始量測 (60秒)</button>
    </div>

    <div class="box" id="reportPanel" style="display:none;">
        <h2>自律神經與複雜度臨床報告</h2>
        
        <div id="chartContainer">
            <canvas id="uCanvas"></canvas>
        </div>

        <div class="grid">
            <div class="card"><label>平均心率 (HR)</label><span id="v_hr">--</span> <small style="color:#888;">bpm</small></div>
            <div class="card"><label>均熵 (AE, 亂度)</label><span id="v_ae">--</span></div>
            <div class="card"><label>熵之熵 (EoE, 複雜度)</label><span id="v_eoe">--</span></div>
            <div class="card"><label>總體神經調控 (SDNN)</label><span id="v_sdnn">--</span> <small style="color:#888;">ms</small></div>
            <div class="card"><label>副交感活性 (RMSSD)</label><span id="v_rmssd">--</span> <small style="color:#888;">ms</small></div>
            <div class="card"><label>高頻比率 (HF nu)</label><span id="v_hf">--</span> <small style="color:#888;">%</small></div>
            <div class="card"><label>交感比率 (LF nu)</label><span id="v_lf">--</span> <small style="color:#888;">%</small></div>
            <div class="card"><label>交感/副交感平衡 (LF/HF)</label><span id="v_lfhf">--</span></div>
            <div class="card" style="grid-column: span 2;"><label>抗壓與恢復能力 (pNN50)</label><span id="v_pnn50">--</span> <small style="color:#888;">%</small></div>
        </div>
    </div>

    <script src="./dsp-algorithms.js"></script>
    <script>
        const video = document.getElementById('video');
        const btnAction = document.getElementById('btnAction');
        const status = document.getElementById('status');
        const reportPanel = document.getElementById('reportPanel');

        let isMeasuring = false;
        let measureTimer = null;
        let frameRequestId = null;

        let trackingCanvas = document.createElement('canvas');
        let trackingCtx = trackingCanvas.getContext('2d');

        // 生物邏輯時間序列容器
        let greenSignalHistory = [];
        let timeHistory = [];
        let rrHistory = [];

        // 影像特徵提取邊界緩衝
        const sampleW = 60;
        const sampleH = 60;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: false })
            .then(stream => {
                video.srcObject = stream;
                status.innerText = "系統就緒，請對準面部並保持靜止。";
            })
            .catch(err => {
                status.innerText = "錯誤: 無法存取相機，請檢查權限設定。";
                console.error(err);
            });

        btnAction.addEventListener('click', () => {
            if (isMeasuring) return;
            startMeasurement();
        });

        function startMeasurement() {
            isMeasuring = true;
            btnAction.disabled = true;
            btnAction.style.background = "#444";
            btnAction.innerText = "量測進行中...";
            reportPanel.style.display = "none";
            
            greenSignalHistory = [];
            timeHistory = [];
            rrHistory = [];

            const duration = 60000; // 臨床黃金 60 秒短期量測
            const startTime = performance.now();

            function processFrame() {
                if (!isMeasuring) return;

                if (video.readyState === video.HAVE_CURRENT_DATA || video.readyState === video.HAVE_ENOUGH_DATA) {
                    if (trackingCanvas.width !== video.videoWidth) {
                        trackingCanvas.width = video.videoWidth;
                        trackingCanvas.height = video.videoHeight;
                    }

                    trackingCtx.drawImage(video, 0, 0, trackingCanvas.width, trackingCanvas.height);
                    
                    // 鎖定額頭/面頰核心光電容積區域 (ROI)
                    const x = Math.floor(trackingCanvas.width / 2 - sampleW / 2);
                    const y = Math.floor(trackingCanvas.height / 2 - sampleH / 2);
                    
                    const imgData = trackingCtx.getImageData(x, y, sampleW, sampleH);
                    const data = imgData.data;
                    
                    let sumGreen = 0;
                    const totalPixels = sampleW * sampleH;
                    
                    for (let i = 1; i < data.length; i += 4) {
                        sumGreen += data[i];
                    }
                    
                    const avgGreen = sumGreen / totalPixels;
                    const nowTime = performance.now();

                    greenSignalHistory.push(avgGreen);
                    timeHistory.push(nowTime);

                    // 即時動態峰值捕捉與心搏間距提取邏輯
                    detectCardiacPhysioValley(greenSignalHistory, timeHistory);
                }

                const elapsed = performance.now() - startTime;
                const remaining = Math.max(0, Math.ceil((duration - elapsed) / 1000));
                status.innerText = `正在擷取皮下毛細血管搏動訊號... 剩餘 ${remaining} 秒`;

                if (elapsed >= duration) {
                    stopMeasurement();
                } else {
                    frameRequestId = requestAnimationFrame(processFrame);
                }
            }

            frameRequestId = requestAnimationFrame(processFrame);
        }

        function stopMeasurement() {
            isMeasuring = false;
            cancelAnimationFrame(frameRequestId);
            btnAction.disabled = false;
            btnAction.style.background = "#00ff66";
            btnAction.innerText = "再次量測";
            status.innerText = "量測完成。正透過短期 HRV 暨熵之熵演算法生成臨床報告...";

            calculateHRVMetrics();
        }

        function detectCardiacPhysioValley(signal, times) {
            if (signal.length < 30) return;
            
            // 呼叫演算法庫進行 0.3Hz - 1.6Hz 4階巴特沃斯濾波器處理
            const filtered = applyButterworthBandpassFilter(signal);
            const idx = filtered.length - 2; 
            
            // 局部最小值判定 (PPG 波谷對應心臟收縮射血，即 ECG 上的 R 峰)
            if (filtered[idx] < filtered[idx - 1] && filtered[idx] < filtered[idx + 1]) {
                const currentValleyTime = times[idx];
                
                if (window.lastValleyTime === undefined) {
                    window.lastValleyTime = currentValleyTime;
                    return;
                }
                
                const rrInterval = currentValleyTime - window.lastValleyTime;
                
                // 生理防錯機制：排除小於 40ms 且大於 1500ms 的異常跳點
                if (rrInterval > 400 && rrInterval < 1500) {
                    rrHistory.push(rrInterval);
                }
                window.lastValleyTime = currentValleyTime;
            }
        }

        // ─── 核心演算法：完全還原原始論文邏輯 ───
        function calculateAE_EoE(filteredRR) {
            const N = filteredRR.length;
            const tau = 17; 
            if (N < tau) return { ae: 0, eoe: 0 };
            
            const xMin = 350; const xMax = 1400; const s1 = 55; 
            const sliceWidth = (xMax - xMin) / s1;
            
            let y_tau = [];
            const numWindows = N - tau + 1; 
            
            for (let i = 0; i < numWindows; i++) {
                const subPoints = filteredRR.slice(i, i + tau);
                let counts = new Array(s1).fill(0);
                subPoints.forEach(val => {
                    let idx = Math.floor((val - xMin) / sliceWidth);
                    if (idx < 0) idx = 0; if (idx >= s1) idx = s1 - 1; counts[idx]++;
                });
                let subEntropy = 0;
                for (let k = 0; k < s1; k++) {
                    let p = counts[k] / tau; if (p > 0) subEntropy -= p * Math.log(p);
                }
                y_tau.push(subEntropy);
            }
            
            // ─── 原始 AE 計算：無任何縮放修正 ───
            let ae = y_tau.reduce((a, b) => a + b, 0) / y_tau.length;
            
            const s2 = 5; 
            const yMax = Math.log(tau); 
            const levelWidth = yMax / s2;
            let levelCounts = new Array(s2).fill(0);
            y_tau.forEach(val => {
                let idx = Math.floor(val / levelWidth);
                if (idx < 0) idx = 0; if (idx >= s2) idx = s2 - 1; levelCounts[idx]++;
            });
            let eoe = 0;
            for (let l = 0; l < s2; l++) {
                let p = levelCounts[l] / y_tau.length; if (p > 0) eoe -= p * Math.log(p);
            }

            // ─── 原始 EoE 計算：無任何縮放修正 ───
            return { ae: ae, eoe: eoe };
        }

        function calculateHRVMetrics() {
            const filteredRR = rrHistory.filter(val => val >= 300 && val <= 1600);
            const N = filteredRR.length;
            
            if (N < 20) {
                status.innerText = "過濾後乾淨樣本數不足，無法生成報告。";
                return;
            }

            const meanRR = filteredRR.reduce((a, b) => a + b, 0) / N;
            const avgHR = 60000 / meanRR;
            document.getElementById('v_hr').innerText = avgHR.toFixed(1);

            const variance = filteredRR.reduce((sum, val) => sum + Math.pow(val - meanRR, 2), 0) / N;
            const sdnn = Math.sqrt(variance);
            
            let diffSumSq = 0; let nn50Count = 0;
            for (let i = 0; i < N - 1; i++) {
                const diff = Math.abs(filteredRR[i + 1] - filteredRR[i]); diffSumSq += Math.pow(diff, 2); if (diff > 50) nn50Count++;
            }
            const rmssd = Math.sqrt(diffSumSq / (N - 1)); const pnn50 = (nn50Count / (N - 1)) * 100;
            
            const estimatedHF = Math.pow(rmssd, 2) * 0.5; 
            const totalPower = Math.pow(sdnn, 2) * 0.8;
            let estimatedLF = totalPower - estimatedHF; 
            if (estimatedLF < estimatedHF * 0.5) estimatedLF = estimatedHF * 1.5; 
            
            const sumLFHF = estimatedLF + estimatedHF;
            const lfnu = (estimatedLF / sumLFHF) * 100;
            const hfnu = (estimatedHF / sumLFHF) * 100;
            const lfhfRatio = estimatedLF / estimatedHF;

            // ─── 關鍵修正：針對 R-R 序列的時間抖動進行「三點中位數濾波」 ───
            let processedRR = [];
            for (let i = 0; i < filteredRR.length; i++) {
                if (i === 0 || i === filteredRR.length - 1) {
                    processedRR.push(filteredRR[i]); // 首尾點直接保留
                } else {
                    // 取 前一點、當前點、後一點 進行排序
                    let arr = [filteredRR[i-1], filteredRR[i], filteredRR[i+1]];
                    arr.sort((a, b) => a - b);
                    processedRR.push(arr[1]); // 寫入排序後的中位數，消除 33.3ms 取樣抖動
                }
            }

            // 將平滑濾波後的真實心搏序列，送去計算 AE 與 EoE
            const entropyMetrics = calculateAE_EoE(processedRR);

            document.getElementById('v_sdnn').innerText = sdnn.toFixed(1);
            document.getElementById('v_rmssd').innerText = rmssd.toFixed(1);
            document.getElementById('v_pnn50').innerText = pnn50.toFixed(1);
            document.getElementById('v_lf').innerText = lfnu.toFixed(1);
            document.getElementById('v_hf').innerText = hfnu.toFixed(1);
            document.getElementById('v_lfhf').innerText = lfhfRatio.toFixed(2);
            document.getElementById('v_ae').innerText = entropyMetrics.ae.toFixed(3);
            document.getElementById('v_eoe').innerText = entropyMetrics.eoe.toFixed(3);

            // 繪製臨床倒 U 字型落點曲線
            drawStaticInvertedU(entropyMetrics.ae, entropyMetrics.eoe);

            reportPanel.style.display = "block";
            reportPanel.scrollIntoView({ behavior: 'smooth' });
        }

        // 繪製倒 U 字型曲線與患者臨床座標點位置
        function drawStaticInvertedU(userAE, userEoE) {
            const canvas = document.getElementById('uCanvas');
            const ctx = canvas.getContext('2d');
            
            const dPR = window.devicePixelRatio || 1;
            canvas.width = canvas.clientWidth * dPR;
            canvas.height = canvas.clientHeight * dPR;
            ctx.scale(dPR, dPR);
            
            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            
            ctx.clearRect(0, 0, w, h);
            
            // 繪製背景參考座標網格
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            for (let i = 1; i < 4; i++) {
                let x = (w / 4) * i; ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h - 20); ctx.stroke();
                let y = ((h - 20) / 4) * i; ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(w, y); ctx.stroke();
            }
            
            // 繪製倒 U 型理論基準曲線
            ctx.strokeStyle = '#00ff66'; ctx.lineWidth = 3; ctx.shadowBlur = 4; ctx.shadowColor = '#00ff66';
            ctx.beginPath();
            let first = true;
            for (let xG = 0.05; xG <= 1.5; xG += 0.01) {
                // 模擬倒 U 理論數學常態曲線
                let yG = 1.35 * Math.exp(-Math.pow(xG - 0.75, 2) / 0.16);
                
                // 轉換至畫布像素座標系
                let cX = 40 + ((xG - 0.05) / 1.45) * (w - 60);
                let cY = (h - 30) - (yG / 1.5) * (h - 50);
                
                if (first) { ctx.moveTo(cX, cY); first = false; } else { ctx.lineTo(cX, cY); }
            }
            ctx.stroke();
            ctx.shadowBlur = 0; // 重設光暈效應

            // 標註經典自律神經三大臨床區域
            ctx.fillStyle = '#ff3333'; ctx.font = '10px sans-serif';
            ctx.fillText('CHF (有序)', 45, h - 35);
            ctx.fillStyle = '#00ff66';
            ctx.fillText('Healthy (健康)', w / 2 - 25, 25);
            ctx.fillStyle = '#ffaa00';
            ctx.fillText('AF (無序)', w - 70, h - 35);
            
            // 軸線標籤
            ctx.fillStyle = '#888';
            ctx.fillText('均熵 (AE)', w - 50, h - 5);
            
            ctx.save();
            ctx.translate(15, h / 2 + 20); ctx.rotate(-Math.PI / 2);
            ctx.fillText('熵之熵 (EoE)', 0, 0);
            ctx.restore();
            
            // 映射並標記受試者當前的量測落點
            let uX = 40 + ((userAE - 0.05) / 1.45) * (w - 60);
            let uY = (h - 30) - (userEoE / 1.5) * (h - 50);
            
            // 防邊界溢出保護
            if (uX < 40) uX = 40; if (uX > w - 20) uX = w - 20;
            if (uY < 10) uY = 10; if (uY > h - 30) uY = h - 30;
            
            // 繪製高亮十字標記與當前受試者粒子
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(uX - 8, uY); ctx.lineTo(uX + 8, uY); ctx.moveTo(uX, uY - 8); ctx.lineTo(uX, uY + 8); ctx.stroke();
            
            ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 10; ctx.shadowColor = '#ffffff';
            ctx.beginPath(); ctx.arc(uX, uY, 5, 0, 2 * Math.PI); ctx.fill();
            ctx.shadowBlur = 0;
        }
    </script>
</body>
</html>
